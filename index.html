<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Attendance QR Check-in System - ระบบเช็คชื่อเข้าห้องเรียนด้วย QR Code</title>
  <meta name="description" content="ระบบเช็คชื่อเข้าเรียนด้วย QR Code และ Session Code สำหรับนักศึกษาและอาจารย์ผู้สอน พร้อมรายงานประวัติเข้าเรียนและแดชบอร์ดสถิติวิเคราะห์ผล">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- CDNs for QR Code, Camera QR Scanner & Interactive Charts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" integrity="sha512-CNgIRecGo7nOMdBqccxHeHZa5fG89jUY5SJiFoVyVYf89jh90hN51g8BPac5q5aTA72EKNXTARJHwTDAWFiCGQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- App Wrapper Shell -->
  <div class="app-container">
    <div class="sidebar-backdrop" id="app-sidebar-backdrop"></div>
    
    <!-- Sidebar Navigation Console -->
    <aside class="sidebar" id="app-sidebar">
      <div class="brand-section">
        <div class="brand-logo">QR</div>
        <div class="brand-name">
          Class Attendance
          <span class="brand-subtitle">Lab Room Console</span>
        </div>
      </div>
      
      <nav class="nav-menu">
        <li class="nav-item active">
          <a class="nav-link" data-target-page="dashboard">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
            Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-target-page="courses">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" /></svg>
            จัดการวิชาเรียน
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-target-page="students">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.109A11.386 11.386 0 0110.089 21c-2.243 0-4.32-.647-6.07-1.758v-.109A4.125 4.125 0 0111.8 16.63a8.932 8.932 0 013.2 2.498zM15 7.5a3 3 0 11-6 0 3 3 0 016 0zm6 3.75a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z" /></svg>
            จัดการนักศึกษา
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-target-page="sessions">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5m-9-6h.008v.008H12v-.008zM12 15h.008v.008H12V15zm0 2.25h.008v.008H12v-.008zM9.75 15h.008v.008H9.75V15zm0 2.25h.008v.008H9.75v-.008zM7.5 15h.008v.008H7.5V15zm0 2.25h.008v.008H7.5v-.008zm6.75-4.5h.008v.008h-.008v-.008zm0 2.25h.008v.008h-.008V15zm0 2.25h.008v.008h-.008v-.008zm2.25-4.5h.008v.008H16.5v-.008zm0 2.25h.008v.008H16.5V15z" /></svg>
            รอบเช็คชื่อเข้าเรียน
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-target-page="reports">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" /></svg>
            รายงานเช็คชื่อ
          </a>
        </li>
      </nav>

      <!-- Switch Panel at bottom -->
      <div class="role-switcher-container">
        <button class="role-btn" id="btn-role-toggle" onclick="window.toggleUserRole()">
          🎓 สลับเป็นโหมดนักศึกษา
        </button>
      </div>
    </aside>

    <!-- Main Content Wrapper -->
    <div class="main-wrapper" id="app-main-wrapper">
      
      <!-- Top header bar -->
      <header class="main-header" id="app-main-header">
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <button class="menu-toggle-btn" id="btn-mobile-menu" title="เปิดเมนู">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg>
          </button>
          <div class="page-title-area">
            <h1 id="header-page-title">Dashboard - ภาพรวมระบบ</h1>
          </div>
        </div>
        
        <div class="header-actions">
          <button class="btn btn-secondary btn-sm" onclick="window.toggleDarkMode()" style="padding: 0.5rem; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 1rem; border: 1px solid var(--color-chalk-dark);" title="สลับโหมดมืด/สว่าง">🌓</button>
          <div class="user-badge">
            <div class="user-avatar">AJ</div>
            <span class="user-name hidden-mobile">อาจารย์ผู้สอน (Lab Room)</span>
          </div>
        </div>
      </header>

      <!-- Main Render Container -->
      <main class="main-content" id="app-view-content">
        <!-- Rendered dynamically by router engine -->
      </main>

    </div>
  </div>

  <!-- Load JS Logic Files in strict order -->
  <script src="js/storage.js"></script>
  <script src="js/components.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/courses.js"></script>
  <script src="js/views/students.js"></script>
  <script src="js/views/sessions.js"></script>
  <script src="js/views/reports.js"></script>
  <script src="js/views/checkin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
